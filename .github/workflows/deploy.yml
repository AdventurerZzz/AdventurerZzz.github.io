name: 自动部署 Hexo 博客

on:
  push:
    branches:
      - main  # 你的分支

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Hexo
        run: npm install -g hexo-cli

      - name: 安装项目依赖
        run: npm install

      - name: 构建静态文件
        run: hexo generate

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages  # 自动部署到这个分支
          user_name: "AdventurerZzz"
          user_email: "695409304@qq.com"